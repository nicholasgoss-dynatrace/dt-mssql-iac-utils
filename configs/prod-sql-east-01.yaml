# Each file is the IaC record for one SQL Server endpoint.
# Files with the same ag_group are compiled into a single monitoring configuration.

name: prod-sql-east-01
enabled: true

# Connection string — no credentials here, those live in the Credential Vault
connection_string: "Server=prod-sql-east-01.corp.example.com;Port=1433;Database=master;"

# Credential Vault ID from create_credential.py output
credential_id: "CREDENTIALS_VAULT-<YOUR_CREDENTIAL_ID>"

# ActiveGate group that will run this extension endpoint.
# All files sharing the same ag_group are batched into one monitoring config.
# Use "environment" to let any AG pick it up.
# Find group IDs with: python deploy_configs.py --list-ag-groups
ag_group: "ag_group-XXXXXXXXXXXXXXXX"

# Optional: human-readable description applied to the monitoring config for this ag_group.
# Only the first file encountered for a group sets the description; others are ignored.
group_description: "Production East MSSQL — managed by dt-mssql-iac-utils"

# Enable SQL Server log ingestion (requires Log Monitoring)
sql_server_logs_enabled: false

# Custom SQL queries (optional)
queries: []
